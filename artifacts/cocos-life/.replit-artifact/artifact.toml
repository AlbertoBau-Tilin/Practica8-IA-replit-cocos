kind = "web"
previewPath = "/"
title = "Coco's Life"
version = "1.0.0"
id = "artifacts/cocos-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20716

[services.development]
run = "pnpm --filter @workspace/cocos-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cocos-life", "run", "build" ]
publicDir = "artifacts/cocos-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20716"
BASE_PATH = "/"
